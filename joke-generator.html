<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Joke Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue: #0071E3;
      --blue-dark: #0058B0;
      --blue-light: #E8F1FB;
      --black: #1D1D1F;
      --gray-1: #F5F5F7;
      --gray-2: #E8E8ED;
      --gray-3: #86868B;
      --white: #FFFFFF;
      --radius-lg: 28px;
      --shadow-md: 0 8px 40px rgba(0,0,0,0.10);
      --shadow-lg: 0 20px 80px rgba(0,0,0,0.14);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--blue-light) 0%, #F0F4FF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }

    .container {
      max-width: 600px;
      width: 100%;
      animation: fadeIn 0.6s ease forwards;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .header {
      margin-bottom: 40px;
    }

    .header-icon {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: var(--gray-3);
      font-weight: 300;
    }

    .joke-container {
      background: var(--gray-1);
      border-radius: 20px;
      padding: 32px;
      margin: 32px 0;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--gray-2);
      transition: all 0.3s ease;
    }

    .joke-container.loading {
      border-color: var(--blue);
      background: rgba(0, 113, 227, 0.05);
    }

    .joke-text {
      font-size: 18px;
      color: var(--black);
      line-height: 1.6;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .joke-text.setup {
      margin-bottom: 16px;
      color: var(--gray-4);
    }

    .joke-text.delivery {
      font-weight: 600;
      color: var(--blue);
      animation: fadeIn 0.4s ease;
    }

    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: -0.01em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--blue);
      color: var(--white);
    }

    .btn-primary:hover {
      background: var(--blue-dark);
      transform: scale(1.04);
      box-shadow: 0 8px 24px rgba(0, 113, 227, 0.35);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--gray-1);
      color: var(--blue);
      border: 1.5px solid var(--blue-light);
    }

    .btn-secondary:hover {
      background: var(--blue-light);
      border-color: var(--blue);
      transform: scale(1.04);
    }

    .btn-secondary:active {
      transform: scale(0.98);
    }

    .category-select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--gray-2);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--black);
      background: var(--white);
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s ease;
    }

    .category-select:hover {
      border-color: var(--blue);
    }

    .category-select:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-2);
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--blue);
    }

    .stat-label {
      font-size: 12px;
      color: var(--gray-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .error-message {
      background: #FFE5E5;
      border: 1px solid #FFB3B3;
      color: #C41E1E;
      padding: 16px;
      border-radius: 12px;
      margin: 20px 0;
      font-size: 14px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .error-message.show {
      display: block;
    }

    .success-animation {
      animation: pulse 0.4s ease;
    }

    @media (max-width: 600px) {
      .card {
        padding: 32px 24px;
      }

      .header h1 {
        font-size: 28px;
      }

      .joke-text {
        font-size: 16px;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .stats {
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <span class="header-icon">😄</span>
        <h1>Joke Generator</h1>
        <p>Get random jokes to brighten your day</p>
      </div>

      <select class="category-select" id="categorySelect">
        <option value="">Any Category</option>
        <option value="general">General</option>
        <option value="programming">Programming</option>
        <option value="knock-knock">Knock-knock</option>
      </select>

      <div class="error-message" id="errorMessage"></div>

      <div class="joke-container" id="jokeContainer">
        <div class="loading-spinner"></div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" id="generateBtn" onclick="generateJoke()">
          <span>🎲</span>
          <span>Get a Joke</span>
        </button>
        <button class="btn btn-secondary" id="shareBtn" onclick="shareJoke()" style="display: none;">
          <span>📋</span>
          <span>Copy Joke</span>
        </button>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-number" id="jokeCount">0</div>
          <div class="stat-label">Jokes Loaded</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="jokeType">—</div>
          <div class="stat-label">Current Type</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let jokeCount = 0;
    let currentJoke = null;
    let isLoading = false;

    const jokeContainer = document.getElementById('jokeContainer');
    const generateBtn = document.getElementById('generateBtn');
    const shareBtn = document.getElementById('shareBtn');
    const errorMessage = document.getElementById('errorMessage');
    const categorySelect = document.getElementById('categorySelect');
    const jokeCountDisplay = document.getElementById('jokeCount');
    const jokeTypeDisplay = document.getElementById('jokeType');

    async function generateJoke() {
      if (isLoading) return;

      isLoading = true;
      generateBtn.disabled = true;
      shareBtn.style.display = 'none';
      errorMessage.classList.remove('show');

      jokeContainer.classList.add('loading');
      jokeContainer.innerHTML = '<div class="loading-spinner"></div>';

      try {
        const category = categorySelect.value;
        const apiUrl = category
          ? `https://v2.jokeapi.dev/joke/${category}`
          : 'https://v2.jokeapi.dev/joke/Any';

        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error(`API Error: ${response.status}`);
        }

        const data = await response.json();

        if (data.error) {
          throw new Error(data.message || 'Could not fetch joke');
        }

        currentJoke = data;
        jokeCount++;
        jokeCountDisplay.textContent = jokeCount;

        // Update joke type display
        const type = data.type === 'single' ? 'Single' : 'Two-part';
        jokeTypeDisplay.textContent = type;

        displayJoke(data);
        jokeContainer.classList.remove('loading');
        jokeContainer.classList.add('success-animation');
        shareBtn.style.display = 'inline-flex';
      } catch (error) {
        console.error('Error fetching joke:', error);
        jokeContainer.classList.remove('loading');
        jokeContainer.innerHTML = `<div class="joke-text">😅 Oops! Couldn't load a joke. Try again!</div>`;

        errorMessage.textContent = `Error: ${error.message}`;
        errorMessage.classList.add('show');
      } finally {
        isLoading = false;
        generateBtn.disabled = false;
      }
    }

    function displayJoke(joke) {
      if (joke.type === 'single') {
        jokeContainer.innerHTML = `<div class="joke-text">${escapeHtml(joke.joke)}</div>`;
      } else {
        jokeContainer.innerHTML = `
          <div>
            <div class="joke-text setup">${escapeHtml(joke.setup)}</div>
            <div class="joke-text delivery">${escapeHtml(joke.delivery)}</div>
          </div>
        `;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function shareJoke() {
      if (!currentJoke) return;

      let jokeText = '';
      if (currentJoke.type === 'single') {
        jokeText = currentJoke.joke;
      } else {
        jokeText = `${currentJoke.setup}\n\n${currentJoke.delivery}`;
      }

      navigator.clipboard.writeText(jokeText).then(() => {
        const originalText = shareBtn.innerHTML;
        shareBtn.innerHTML = '<span>✓</span><span>Copied!</span>';
        shareBtn.style.background = '#34C759';
        shareBtn.style.color = 'white';

        setTimeout(() => {
          shareBtn.innerHTML = originalText;
          shareBtn.style.background = '';
          shareBtn.style.color = '';
        }, 2000);
      }).catch(err => {
        console.error('Could not copy joke:', err);
        alert('Could not copy to clipboard');
      });
    }

    // Auto-load a joke when page loads
    window.addEventListener('load', () => {
      setTimeout(generateJoke, 300);
    });

    // Allow Enter key to generate joke
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isLoading) {
        generateJoke();
      }
    });
  </script>
</body>
</html>
